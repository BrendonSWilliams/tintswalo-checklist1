<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tintswalo Boulders — Housekeeping Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1b2d4f;--navy-deep:#0f1e35;--gold:#b8934a;--gold-light:#d4aa6a;
    --sand:#f7f3ed;--sand-dim:#e4ddd3;--white:#fff;--muted:#7a8a9a;
    --sage:#3a6b45;--sage-light:#4d9060;--wa:#25D366;--wa-dark:#128C7E;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--sand);color:var(--navy);font-family:'Montserrat',sans-serif;min-height:100vh;padding-bottom:110px}

  .header{background:var(--navy-deep);padding:14px 18px;border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:10}
  .header-logo{height:34px;filter:brightness(0) invert(1);opacity:.9;margin-bottom:6px;display:block}
  .header-room{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--gold-light);line-height:1}
  .header-type{font-size:9px;font-weight:600;letter-spacing:.35em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:3px}
  .header-guest{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}

  .progress-wrap{background:var(--navy-deep);padding:10px 18px 14px;border-bottom:1px solid rgba(184,147,74,.2)}
  .progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;overflow:hidden}
  .progress-fill{background:linear-gradient(90deg,var(--gold),var(--gold-light));height:100%;border-radius:10px;transition:width .4s ease}
  .progress-text{font-size:9px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-top:5px}

  .body{padding:14px}
  .section{margin-bottom:16px}
  .section-title{font-size:8px;font-weight:600;letter-spacing:.36em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--sand-dim)}

  .task-item{display:flex;align-items:center;gap:12px;background:var(--white);border:1px solid var(--sand-dim);border-radius:6px;padding:13px 14px;margin-bottom:7px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;user-select:none}
  .task-item.done{background:rgba(77,144,96,.06);border-color:rgba(77,144,96,.25)}
  .task-item:active{transform:scale(.98)}
  .task-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--sand-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:14px;color:white}
  .task-item.done .task-check{background:var(--sage-light);border-color:var(--sage-light)}
  .task-text{font-size:14px;font-weight:500;color:var(--navy);transition:all .2s;line-height:1.3}
  .task-item.done .task-text{text-decoration:line-through;color:var(--muted)}

  .complete-btn{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:460px;background:var(--wa);border:none;color:white;padding:17px;border-radius:12px;font-family:'Montserrat',sans-serif;font-size:15px;font-weight:600;letter-spacing:.1em;cursor:pointer;transition:all .2s;box-shadow:0 8px 28px rgba(37,211,102,.4);display:none;z-index:20}
  .complete-btn.visible{display:block;animation:popIn .3s ease}
  @keyframes popIn{from{transform:translateX(-50%) scale(.92);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}
  .complete-btn:active{transform:translateX(-50%) scale(.97)}

  .done-screen{display:none;padding:48px 20px;text-align:center}
  .done-screen.show{display:block}
  .done-icon{font-size:64px;margin-bottom:16px}
  .done-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;color:var(--sage);margin-bottom:8px}
  .done-sub{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:16px}
  .done-msg{background:rgba(77,144,96,.08);border:1px solid rgba(77,144,96,.2);border-radius:6px;padding:12px;font-size:11px;color:var(--sage);line-height:1.5;margin-bottom:16px}
  .notify-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--wa);color:white;text-decoration:none;padding:16px 24px;border-radius:12px;font-family:'Montserrat',sans-serif;font-size:15px;font-weight:600;letter-spacing:.1em;box-shadow:0 8px 28px rgba(37,211,102,.4);transition:all .2s;margin:0 auto;max-width:320px}
  .notify-btn:active{transform:scale(.97)}
  .notify-sent{font-size:13px;color:var(--sage);font-weight:600;margin-top:14px;letter-spacing:.05em}
</style>
</head>

    'Clean windows',
    'Open curtains / adjust blinds',
    'Set correct room temperature',
    'Check & restock minibar',
    'Final walk-through',
    'Report any maintenance issues'
  ]}
];

const TURNDOWN_TASKS = [
  {section:'Bedroom Prep', tasks:[
    'Turn down bed on guest side(s)',
    'Place chocolates / treat on pillow',
    'Fold back duvet neatly',
    'Close curtains / blinds',
    'Set bedside lamp to low'
  ]},
  {section:'Bathroom', tasks:[
    'Replace used towels with fresh',
    'Fold towels neatly',
    'Top up toiletries',
    'Wipe basin & taps',
    'Empty bin if needed'
  ]},
  {section:'Room', tasks:[
    'Clear & tidy any dishes / glasses',
    'Empty main bin if needed',
    'Straighten cushions & décor',
    'Check & restock minibar'
  ]},
  {section:'Final Check', tasks:[
    'All lights correct',
    'Temperature comfortable',
    'No maintenance issues',
    'Room locked after leaving'
  ]}
];

// ── READ URL PARAMS (room, type, guest, mgr, jobId only — no tasks) ──────
const p    = new URLSearchParams(window.location.search);
const room  = p.get('room')  || 'Unknown Room';
const type  = p.get('type')  || 'clean';
const guest = p.get('guest') || 'Guest';
const mgr   = p.get('mgr')   || '';
const jobId = p.get('jobId') || Date.now().toString();

// Pick the right task list based on type
const sections = type === 'clean' ? CLEAN_TASKS : TURNDOWN_TASKS;

// ── POPULATE HEADER ───────────────────────────────────────────────────────
document.getElementById('hRoom').textContent  = room;
document.getElementById('hType').textContent  = type === 'clean' ? '🧹 Room Clean Checklist' : '🌙 Turndown Service Checklist';
document.getElementById('hGuest').textContent = 'Guest: ' + guest;
document.title = room + ' — ' + (type === 'clean' ? 'Room Clean' : 'Turndown') + ' Checklist';

// ── STATE ─────────────────────────────────────────────────────────────────
const storageKey = 'tb_cl_' + jobId;
let state = {};
try { state = JSON.parse(localStorage.getItem(storageKey) || '{}'); } catch(e){}

function totalTasks(){ return sections.reduce(function(a,s){ return a + s.tasks.length; }, 0); }
function doneTasks(){  return Object.values(state).filter(Boolean).length; }

// ── RENDER ────────────────────────────────────────────────────────────────
function updateProgress(){
  var tot = totalTasks(), done = doneTasks();
  var pct = tot ? Math.round(done / tot * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' of ' + tot + ' tasks complete';
  document.getElementById('completeBtn').classList.toggle('visible', tot > 0 && done === tot);
}

function render(){
  var html = '';
  sections.forEach(function(sec){
    html += '<div class="section"><div class="section-title">' + sec.section + '</div>';
    sec.tasks.forEach(function(task, i){
      var key = sec.section + '::' + i;
      var done = !!state[key];
      html += '<div class="task-item' + (done ? ' done' : '') + '" onclick="toggle(\'' + key.replace(/\'/g,'\\x27') + '\')">';
      html += '<div class="task-check">' + (done ? '✓' : '') + '</div>';
      html += '<div class="task-text">' + task + '</div>';
      html += '</div>';
    });
    html += '</div>';
  });
  document.getElementById('tasksWrap').innerHTML = html;
  updateProgress();
}

function toggle(key){
  state[key] = !state[key];
  try { localStorage.setItem(storageKey, JSON.stringify(state)); } catch(e){}
  render();
}

// ── COMPLETE ──────────────────────────────────────────────────────────────
function markComplete(){
  var t = new Date().toLocaleTimeString('en-ZA', {hour:'2-digit', minute:'2-digit', hour12:false});
  var label = type === 'clean' ? 'Room Clean' : 'Turndown Service';
  var em    = type === 'clean' ? '🧹' : '🌙';
  var msg = '✅ *Tintswalo Boulders*\n\n' + em + ' *' + label + ' Complete!*\n\nRoom: *' + room + '*\nGuest: ' + guest + '\nTime: ' + t + '\n\nAll ' + totalTasks() + ' tasks completed ✔';

  document.getElementById('tasksWrap').style.display = 'none';
  document.getElementById('completeBtn').style.display = 'none';
  document.getElementById('doneScreen').classList.add('show');
  document.getElementById('doneMsg').textContent = label + ' completed at ' + t;

  // Build a real <a> link — never blocked on mobile unlike window.open
  if(mgr){
    var phone = mgr.replace(/\D/g, '');
    var waURL = 'https://wa.me/' + phone + '?text=' + encodeURIComponent(msg);
    var btn = document.getElementById('notifyBtn');
    btn.href = waURL;
    btn.style.display = 'flex';
    btn.onclick = function(){
      setTimeout(function(){
        document.getElementById('notifyBtn').style.display = 'none';
        document.getElementById('notifySent').style.display = 'block';
      }, 1000);
    };
  } else {
    // No manager number — show a message
    document.getElementById('doneMsg').textContent += '\n(No manager number set — cannot send notification)';
  }
}

render();
</script>
</body>
</html>
